<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRANO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a;
      --border-hover: #444; --text: #e0e0e0; --muted: #555;
      --dim: #888; --accent: #fff; --r: 8px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'SF Mono','Fira Code',monospace;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 300px;
      grid-template-rows: auto 1fr auto;
      grid-template-areas: "header header" "canvas panel" "footer footer";
    }
    header {
      grid-area: header;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      gap: 12px; flex-wrap: wrap;
    }
    .logo { font-size: 11px; letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; }
    .logo span { color: var(--text); }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--r);
      color: var(--dim); font-size: 11px; font-family: inherit; letter-spacing: 0.06em;
      cursor: pointer; background: transparent;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      text-transform: uppercase; white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-hover); color: var(--text); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn.primary { border-color: #333; color: var(--text); background: #1e1e1e; }
    .btn.primary:hover { background: #252525; border-color: #555; }
    #upload { display: none; }
    .canvas-area {
      grid-area: canvas; display: flex; align-items: center; justify-content: center;
      padding: 20px; background: #0a0a0a; min-height: 0;
    }
    #canvasWrap {
      position: relative; max-width: 100%; max-height: calc(100vh - 120px);
      border-radius: var(--r); overflow: hidden; box-shadow: 0 0 0 1px var(--border);
    }
    #canvasWrap canvas { display: block; max-width: 100%; max-height: calc(100vh - 120px); width: auto; height: auto; }
    .drop-hint {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: var(--muted); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; pointer-events: none;
    }
    .drop-hint svg { opacity: 0.3; }
    #canvasWrap.has-image .drop-hint { display: none; }
    .panel {
      grid-area: panel; border-left: 1px solid var(--border);
      background: var(--surface); overflow-y: auto; display: flex; flex-direction: column;
    }
    .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .section-title { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
    .ctrl { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 6px 8px; margin-bottom: 12px; }
    .ctrl:last-child { margin-bottom: 0; }
    .ctrl-label { font-size: 10px; color: var(--dim); letter-spacing: 0.05em; }
    .ctrl-value { font-size: 10px; color: var(--text); text-align: right; min-width: 36px; }
    .ctrl input[type="range"] { grid-column: 1/-1; width: 100%; accent-color: var(--accent); height: 2px; cursor: pointer; }
    .tint-row { display: flex; gap: 6px; align-items: center; grid-column: 1/-1; flex-wrap: wrap; }
    .tint-swatch {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: border-color 0.15s, transform 0.1s; flex-shrink: 0;
    }
    .tint-swatch:hover { transform: scale(1.15); }
    .tint-swatch.active { border-color: var(--accent); }
    #tintColorPicker { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; padding: 0; background: none; overflow: hidden; flex-shrink: 0; }
    .res-btns { grid-column: 1/-1; display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
    .res-btn {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px;
      background: transparent; color: var(--dim); font-size: 10px; font-family: inherit;
      letter-spacing: 0.05em; cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .res-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .res-btn.active { border-color: var(--accent); color: var(--accent); background: #1e1e1e; }
    footer {
      grid-area: footer; border-top: 1px solid var(--border);
      padding: 8px 20px; display: flex; align-items: center; justify-content: space-between;
      gap: 12px; min-height: 36px;
    }
    #status { font-size: 10px; color: var(--dim); letter-spacing: 0.05em; flex: 1; }
    .progress-wrap { width: 160px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; opacity: 0; transition: opacity 0.2s; }
    .progress-wrap.visible { opacity: 1; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }
    #hint { font-size: 10px; color: var(--muted); line-height: 1.7; padding: 12px 16px; background: #111; border-top: 1px solid var(--border); display: none; }
    #hint code { background: #1a1a1a; padding: 2px 5px; border-radius: 3px; color: #888; font-size: 9px; font-family: inherit; }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    @media (max-width: 700px) {
      body { grid-template-columns: 1fr; grid-template-areas: "header" "canvas" "panel" "footer"; }
      .panel { border-left: none; border-top: 1px solid var(--border); }
      .canvas-area { padding: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">GRANO<span>v1.0</span></div>
  <div class="header-actions">
    <label class="btn primary" id="uploadLabel">
      <input type="file" id="upload" accept="image/*">↑ cargar imagen
    </label>
    <button class="btn" id="downloadFrame">PNG</button>
    <button class="btn" id="downloadGif">GIF</button>
    <button class="btn" id="downloadVideo">WebM</button>
  </div>
</header>

<div class="canvas-area" id="canvasArea">
  <div id="canvasWrap">
    <canvas id="c"></canvas>
    <div class="drop-hint">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="13.5" r="1.5"/>
      </svg>
      cargar imagen
    </div>
  </div>
</div>

<aside class="panel">

  <div class="panel-section">
    <div class="section-title">Grain</div>
    <div class="ctrl">
      <span class="ctrl-label">intensidad</span><span class="ctrl-value" id="intensityVal">60</span>
      <input type="range" id="intensity" min="0" max="255" value="60" step="1">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">opacidad</span><span class="ctrl-value" id="opacityVal">0.35</span>
      <input type="range" id="opacity" min="0" max="1" value="0.35" step="0.01">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">velocidad</span><span class="ctrl-value" id="speedVal">4</span>
      <input type="range" id="speed" min="1" max="10" value="4" step="1">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">color noise</span><span class="ctrl-value" id="colorNoiseVal">0.00</span>
      <input type="range" id="colorNoise" min="0" max="1" value="0" step="0.01">
    </div>
  </div>

  <div class="panel-section">
    <div class="section-title">Imagen</div>
    <div class="ctrl">
      <span class="ctrl-label">exposición</span><span class="ctrl-value" id="exposureVal">0</span>
      <input type="range" id="exposure" min="-100" max="100" value="0" step="1">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">contraste</span><span class="ctrl-value" id="contrastVal">0</span>
      <input type="range" id="contrast" min="-100" max="100" value="0" step="1">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">saturación</span><span class="ctrl-value" id="saturationVal">0</span>
      <input type="range" id="saturation" min="-100" max="100" value="0" step="1">
    </div>
  </div>

  <div class="panel-section">
    <div class="section-title">Efectos</div>
    <div class="ctrl">
      <span class="ctrl-label">dreamy / bloom</span><span class="ctrl-value" id="dreamyVal">0.00</span>
      <input type="range" id="dreamy" min="0" max="1" value="0" step="0.01">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">vignette</span><span class="ctrl-value" id="vignetteVal">0.00</span>
      <input type="range" id="vignette" min="0" max="1" value="0" step="0.01">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">aberración cromática</span><span class="ctrl-value" id="chromaVal">0</span>
      <input type="range" id="chroma" min="0" max="20" value="0" step="0.5">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">scanlines</span><span class="ctrl-value" id="scanlinesVal">0.00</span>
      <input type="range" id="scanlines" min="0" max="1" value="0" step="0.01">
    </div>
    <div class="ctrl">
      <span class="ctrl-label">pixelización</span><span class="ctrl-value" id="pixelateVal">1</span>
      <input type="range" id="pixelate" min="1" max="32" value="1" step="1">
    </div>
  </div>

  <div class="panel-section">
    <div class="section-title">Tint</div>
    <div class="ctrl">
      <span class="ctrl-label">intensidad tint</span><span class="ctrl-value" id="tintOpacityVal">0.00</span>
      <input type="range" id="tintOpacity" min="0" max="0.6" value="0" step="0.01">
    </div>
    <div class="ctrl">
      <div class="tint-row">
        <div class="tint-swatch active" style="background:#ffffff" data-color="#ffffff"></div>
        <div class="tint-swatch" style="background:#c8a87a" data-color="#c8a87a"></div>
        <div class="tint-swatch" style="background:#6fa8d4" data-color="#6fa8d4"></div>
        <div class="tint-swatch" style="background:#a8d4a0" data-color="#a8d4a0"></div>
        <div class="tint-swatch" style="background:#d4a8c8" data-color="#d4a8c8"></div>
        <div class="tint-swatch" style="background:#d4c8a8" data-color="#d4c8a8"></div>
        <input type="color" id="tintColorPicker" value="#ffffff">
      </div>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-title">Export</div>
    <div class="ctrl">
      <span class="ctrl-label">resolución</span>
      <div class="res-btns">
        <button class="res-btn" data-res="360">360p</button>
        <button class="res-btn" data-res="480">480p</button>
        <button class="res-btn active" data-res="720">720p</button>
        <button class="res-btn" data-res="1080">1080p</button>
      </div>
    </div>
  </div>

</aside>

<footer>
  <div id="status">listo</div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</footer>
<div id="hint"></div>

<script>
  // ── Config ─────────────────────────────────────────
  const MAX_PREVIEW = 1280;
  const DURATION    = 5000;  // ms para WebM
  const FPS_WEBM    = 12;
  const GIF_FRAMES  = 10;    // frames para GIF (loop infinito, pocos frames = liviano)
  const GIF_FPS     = 10;    // fps del GIF

  // ── State ──────────────────────────────────────────
  let intensity=60, opacity=0.35, speed=4, colorNoise=0;
  let dreamy=0, vignette=0, chroma=0, scanlines=0, pixelate=1;
  let exposure=0, contrast=0, saturation=0;
  let tintColor=[255,255,255], tintOpacity=0;
  let lastFrame=0, busy=false, chromaTime=0;
  let exportRes=720;

  // ── Canvas ─────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const wrap   = document.getElementById('canvasWrap');
  const img    = new Image();

  function initCanvas(w, h) {
    const s = Math.min(1, MAX_PREVIEW / Math.max(w, h));
    canvas.width  = Math.round(w * s);
    canvas.height = Math.round(h * s);
  }

  img.onload  = () => { initCanvas(img.naturalWidth, img.naturalHeight); wrap.classList.add('has-image'); };
  img.onerror = () => { initCanvas(540, 720); ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,540,720); };
  initCanvas(540, 720);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 540, 720);
  requestAnimationFrame(loop);

  // ── Noise ──────────────────────────────────────────
  const noiseC = document.createElement('canvas');
  const nCtx   = noiseC.getContext('2d');

  function generateNoise(w, h) {
    noiseC.width = w; noiseC.height = h;
    const id = nCtx.createImageData(w, h);
    const d  = id.data;
    for (let i = 0; i < d.length; i += 4) {
      if (colorNoise > 0) {
        d[i]   = 128 + (Math.random()*intensity*2 - intensity);
        d[i+1] = 128 + (Math.random()*intensity*2 - intensity);
        d[i+2] = 128 + (Math.random()*intensity*2 - intensity);
      } else {
        const v = 128 + (Math.random()*intensity*2 - intensity);
        d[i]=d[i+1]=d[i+2]=v;
      }
      d[i+3] = 255;
    }
    nCtx.putImageData(id, 0, 0);
  }

  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  // ── Render ─────────────────────────────────────────
  function renderTo(tCtx, w, h, t) {
    tCtx.clearRect(0, 0, w, h);

    // 1. Imagen base
    if (img.complete && img.naturalWidth > 0) {
      const bright = 1 + exposure/100;
      const cont   = 1 + contrast/100;
      const sat    = 1 + saturation/100;
      tCtx.filter = `brightness(${bright}) contrast(${cont}) saturate(${sat})`;
      if (pixelate > 1) {
        const pw = Math.max(1, Math.floor(w/pixelate));
        const ph = Math.max(1, Math.floor(h/pixelate));
        const tmp = document.createElement('canvas');
        tmp.width=pw; tmp.height=ph;
        tmp.getContext('2d').drawImage(img, 0, 0, pw, ph);
        tCtx.save(); tCtx.imageSmoothingEnabled=false;
        tCtx.drawImage(tmp, 0, 0, w, h);
        tCtx.restore();
      } else {
        tCtx.drawImage(img, 0, 0, w, h);
      }
      tCtx.filter = 'none';
    }

    // 2. Aberración cromática animada
    if (chroma > 0) {
      const ts = (t || chromaTime) / 1000;
      const sx = Math.sin(ts*0.7)*0.6 + Math.sin(ts*1.3)*0.4;
      const sy = Math.sin(ts*0.5+1.2)*0.5 + Math.sin(ts*0.9)*0.5;
      const shiftX = Math.round(chroma * sx);
      const shiftY = Math.round(chroma * 0.35 * sy);
      const tmpCA = document.createElement('canvas');
      tmpCA.width=w; tmpCA.height=h;
      const caCtx = tmpCA.getContext('2d');
      caCtx.drawImage(img.complete && img.naturalWidth > 0 ? img : canvas, 0, 0, w, h);
      const id  = caCtx.getImageData(0,0,w,h);
      const src = new Uint8ClampedArray(id.data);
      for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
        const i=(y*w+x)*4;
        const rxc=Math.max(0,Math.min(w-1,x+shiftX)), ryc=Math.max(0,Math.min(h-1,y+shiftY));
        id.data[i]   = src[(ryc*w+rxc)*4];
        const bxc=Math.max(0,Math.min(w-1,x-shiftX)), byc=Math.max(0,Math.min(h-1,y-shiftY));
        id.data[i+2] = src[(byc*w+bxc)*4+2];
      }
      caCtx.putImageData(id,0,0);
      tCtx.drawImage(tmpCA,0,0);
    }

    // 3. Dreamy bloom
    if (dreamy > 0) {
      const bloomC = document.createElement('canvas');
      bloomC.width=w; bloomC.height=h;
      const bCtx = bloomC.getContext('2d');
      const blurScale = Math.max(0.06, 0.14 - dreamy*0.08);
      const bw=Math.max(4,Math.round(w*blurScale)), bh=Math.max(4,Math.round(h*blurScale));
      bCtx.drawImage(img.complete && img.naturalWidth>0 ? img : canvas, 0,0,bw,bh);
      bCtx.imageSmoothingEnabled=true; bCtx.imageSmoothingQuality='high';
      bCtx.drawImage(bloomC, 0,0,bw,bh, 0,0,w,h);
      tCtx.save();
      tCtx.globalAlpha=dreamy*0.5; tCtx.globalCompositeOperation='screen';
      tCtx.drawImage(bloomC,0,0);
      tCtx.globalAlpha=dreamy*0.25; tCtx.globalCompositeOperation='lighten';
      tCtx.drawImage(bloomC,0,0);
      tCtx.restore();
    }

    // 4. Tint
    if (tintOpacity > 0) {
      tCtx.save();
      tCtx.globalAlpha=tintOpacity; tCtx.globalCompositeOperation='multiply';
      tCtx.fillStyle=`rgb(${tintColor[0]},${tintColor[1]},${tintColor[2]})`;
      tCtx.fillRect(0,0,w,h);
      tCtx.restore();
    }

    // 5. Grain
    if (intensity > 0 && opacity > 0) {
      generateNoise(w,h);
      tCtx.save();
      tCtx.globalAlpha = colorNoise>0 ? opacity*(1-colorNoise*0.4) : opacity;
      tCtx.globalCompositeOperation='overlay';
      tCtx.drawImage(noiseC,0,0);
      if (colorNoise > 0) {
        generateNoise(w,h);
        tCtx.globalAlpha=opacity*colorNoise*0.7;
        tCtx.globalCompositeOperation='screen';
        tCtx.drawImage(noiseC,0,0);
      }
      tCtx.restore();
    }

    // 6. Scanlines
    if (scanlines > 0) {
      tCtx.save(); tCtx.globalAlpha=scanlines*0.6;
      for (let y=0;y<h;y+=2) { tCtx.fillStyle='#000'; tCtx.fillRect(0,y,w,1); }
      tCtx.restore();
    }

    // 7. Vignette
    if (vignette > 0) {
      const grad = tCtx.createRadialGradient(w/2,h/2,h*0.2,w/2,h/2,h*0.85);
      grad.addColorStop(0,'rgba(0,0,0,0)');
      grad.addColorStop(1,`rgba(0,0,0,${vignette*0.85})`);
      tCtx.save(); tCtx.fillStyle=grad; tCtx.fillRect(0,0,w,h); tCtx.restore();
    }
  }

  // ── Loop principal ─────────────────────────────────
  function loop(ts) {
    if (!busy) {
      chromaTime = ts;
      const interval = 110 - speed*10;
      if (ts - lastFrame > interval) {
        renderTo(ctx, canvas.width, canvas.height, ts);
        lastFrame = ts;
      }
    }
    requestAnimationFrame(loop);
  }

  // ── UI ─────────────────────────────────────────────
  const statusEl     = document.getElementById('status');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const hint         = document.getElementById('hint');

  function setUI(isBusy, msg='') {
    busy = isBusy;
    statusEl.textContent = msg || (isBusy ? '...' : 'listo');
    progressWrap.classList.toggle('visible', isBusy);
    if (!isBusy) progressFill.style.width='0%';
    ['downloadGif','downloadVideo','downloadFrame'].forEach(id =>
      document.getElementById(id).disabled = isBusy
    );
  }
  function setProgress(pct) { progressFill.style.width=Math.min(100,Math.round(pct))+'%'; }
  function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

  // ── Upload & drag ──────────────────────────────────
  document.getElementById('upload').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    img.src = URL.createObjectURL(file);
    document.getElementById('uploadLabel').childNodes[1].textContent = '↑ ' + file.name.slice(0,16);
    hint.style.display = 'none';
  });
  const area = document.getElementById('canvasArea');
  area.addEventListener('dragover', e => e.preventDefault());
  area.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) { img.src=URL.createObjectURL(file); wrap.classList.add('has-image'); }
  });

  // ── Frame PNG ──────────────────────────────────────
  document.getElementById('downloadFrame').addEventListener('click', () => {
    renderTo(ctx, canvas.width, canvas.height);
    const a=document.createElement('a'); a.download='visual-snow.png'; a.href=canvas.toDataURL('image/png'); a.click();
  });

  // ── GIF export ─────────────────────────────────────
  // Solo GIF_FRAMES frames — suficiente para loop infinito convincente
  document.getElementById('downloadGif').addEventListener('click', async () => {
    hint.style.display='none';
    setUI(true, 'preparando GIF...');
    await sleep(30);

    const srcW = img.naturalWidth  || canvas.width;
    const srcH = img.naturalHeight || canvas.height;
    const scale = Math.min(1, exportRes / Math.max(srcW, srcH));
    const gw = Math.round(srcW * scale);
    const gh = Math.round(srcH * scale);
    const delay = Math.round(100 / GIF_FPS); // centésimas de segundo

    const off = document.createElement('canvas');
    off.width=gw; off.height=gh;
    const offCtx = off.getContext('2d');
    const frames = [];

    // Capturar GIF_FRAMES frames con tiempos distribuidos (para que la aberración varíe)
    for (let i=0; i<GIF_FRAMES; i++) {
      const t = (i / GIF_FRAMES) * 3000; // simular 3s de tiempo para variar efectos
      renderTo(offCtx, gw, gh, t);
      frames.push(new Uint8Array(offCtx.getImageData(0,0,gw,gh).data));
      setProgress((i/GIF_FRAMES)*35);
      statusEl.textContent=`capturando frame ${i+1}/${GIF_FRAMES}...`;
      await sleep(0);
    }

    statusEl.textContent='construyendo paleta...';
    setProgress(35); await sleep(20);
    const palette = medianCut(frames, gw, gh, 256);

    const indexed=[];
    for (let i=0; i<frames.length; i++) {
      indexed.push(orderedDither(frames[i], gw, gh, palette));
      setProgress(40+(i/frames.length)*35);
      statusEl.textContent=`dithering ${i+1}/${frames.length}...`;
      await sleep(0);
    }

    statusEl.textContent='codificando GIF...';
    setProgress(75); await sleep(20);

    try {
      const blob = await encodeGIF(indexed, palette, gw, gh, delay, p=>setProgress(75+p*25));
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='visual-snow.gif'; a.click();
      setUI(false, `GIF — ${(blob.size/1024/1024).toFixed(1)} MB · ${gw}×${gh} · ${GIF_FRAMES}f loop`);
    } catch(e) { setUI(false,'error: '+e.message); }
    setTimeout(()=>{ if(!busy) statusEl.textContent='listo'; },5000);
  });

  // ── WebM export ────────────────────────────────────
  // Graba el canvas principal (ya visible en el DOM → MediaRecorder funciona)
  // y lo escala al inicio para respetar exportRes
  document.getElementById('downloadVideo').addEventListener('click', async () => {
    hint.style.display='none';

    // Ajustar canvas principal a exportRes antes de grabar
    const srcW = img.naturalWidth  || canvas.width;
    const srcH = img.naturalHeight || canvas.height;
    const scale = Math.min(1, exportRes / Math.max(srcW, srcH));
    const ew = Math.round(srcW*scale);
    const eh = Math.round(srcH*scale);

    // Guardar tamaño de preview y redimensionar para grabación
    const prevW = canvas.width, prevH = canvas.height;
    canvas.width=ew; canvas.height=eh;

    const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
      .find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e){return false;} }) || 'video/webm';

    setUI(true, `grabando ${ew}×${eh}...`);
    await sleep(100); // dar tiempo al canvas para redimensionar

    const stream = canvas.captureStream(FPS_WEBM);

    // Validar que el stream tiene tracks antes de continuar
    if (!stream || stream.getVideoTracks().length === 0) {
      canvas.width=prevW; canvas.height=prevH;
      setUI(false,'error: no se pudo capturar el canvas');
      return;
    }

    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
    const chunks=[];
    recorder.ondataavailable = e => { if (e.data && e.data.size>0) chunks.push(e.data); };

    recorder.onstop = () => {
      // Restaurar tamaño de preview
      canvas.width=prevW; canvas.height=prevH;
      busy=false;

      if (chunks.length === 0) {
        setUI(false,'error: grabación vacía');
        return;
      }
      const blob = new Blob(chunks, {type:mimeType});
      if (blob.size < 1000) {
        setUI(false,`error: archivo demasiado pequeño (${blob.size}B)`);
        return;
      }
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='visual-snow.webm'; a.click();
      setUI(false,`WebM — ${(blob.size/1024/1024).toFixed(1)} MB · ${ew}×${eh}px`);
      hint.style.display='block';
      hint.innerHTML=`→ convertir a MP4: <code>ffmpeg -i visual-snow.webm -c:v libx264 -pix_fmt yuv420p -crf 23 output.mp4</code>`;
      setTimeout(()=>{ if(!busy) statusEl.textContent='listo'; },5000);
    };

    recorder.onerror = e => {
      canvas.width=prevW; canvas.height=prevH;
      setUI(false,'error MediaRecorder: '+e.error?.message);
    };

    const start = performance.now();
    busy = false; // el loop puede renderizar

    // Pedir datos cada segundo para no perder nada
    recorder.start(1000);

    function rec(ts) {
      const elapsed = performance.now()-start;
      const interval = 110-speed*10;
      if (ts-lastFrame > interval) {
        renderTo(ctx, ew, eh, ts);
        lastFrame=ts;
      }
      setProgress((elapsed/DURATION)*100);
      statusEl.textContent=`grabando ${Math.min(Math.round(elapsed/1000),5)}s / 5s · ${ew}×${eh}`;
      if (elapsed < DURATION) {
        requestAnimationFrame(rec);
      } else {
        recorder.requestData(); // forzar flush del último chunk
        setTimeout(()=>recorder.stop(), 200);
      }
    }
    requestAnimationFrame(rec);
  });

  // ── Controles ──────────────────────────────────────
  const bind=(id,set,fmt)=>{
    const el=document.getElementById(id), out=document.getElementById(id+'Val');
    el.addEventListener('input',e=>{ set(+e.target.value); if(out) out.textContent=fmt(+e.target.value); });
  };
  bind('intensity',  v=>intensity=v,  v=>v);
  bind('opacity',    v=>opacity=v,    v=>v.toFixed(2));
  bind('speed',      v=>speed=v,      v=>v);
  bind('colorNoise', v=>colorNoise=v, v=>v.toFixed(2));
  bind('dreamy',     v=>dreamy=v,     v=>v.toFixed(2));
  bind('vignette',   v=>vignette=v,   v=>v.toFixed(2));
  bind('chroma',     v=>chroma=v,     v=>v);
  bind('scanlines',  v=>scanlines=v,  v=>v.toFixed(2));
  bind('pixelate',   v=>pixelate=v,   v=>v);
  bind('exposure',   v=>exposure=v,   v=>(v>0?'+':'')+v);
  bind('contrast',   v=>contrast=v,   v=>(v>0?'+':'')+v);
  bind('saturation', v=>saturation=v, v=>(v>0?'+':'')+v);
  bind('tintOpacity',v=>tintOpacity=v,v=>v.toFixed(2));

  document.querySelectorAll('.res-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.res-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); exportRes=+btn.dataset.res;
    });
  });
  document.querySelectorAll('.tint-swatch').forEach(sw=>{
    sw.addEventListener('click',()=>{
      document.querySelectorAll('.tint-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      tintColor=hexToRgb(sw.dataset.color);
      document.getElementById('tintColorPicker').value=sw.dataset.color;
    });
  });
  document.getElementById('tintColorPicker').addEventListener('input',e=>{
    tintColor=hexToRgb(e.target.value);
    document.querySelectorAll('.tint-swatch').forEach(s=>s.classList.remove('active'));
  });

  // ══════════════════════════════════════════════════
  // GIF encoder: Median Cut + Ordered Dither + LZW
  // ══════════════════════════════════════════════════

  function medianCut(frames,w,h,numColors) {
    const step=Math.max(1,Math.floor((frames.length*w*h)/15000));
    const pixels=[];
    for(const d of frames) for(let i=0;i<d.length;i+=4*step) pixels.push([d[i],d[i+1],d[i+2]]);
    function cut(bucket,depth) {
      if(depth===0||!bucket.length){
        let r=0,g=0,b=0; for(const p of bucket){r+=p[0];g+=p[1];b+=p[2];}
        const n=bucket.length||1; return [[Math.round(r/n),Math.round(g/n),Math.round(b/n)]];
      }
      let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
      for(const p of bucket){
        if(p[0]<minR)minR=p[0];if(p[0]>maxR)maxR=p[0];
        if(p[1]<minG)minG=p[1];if(p[1]>maxG)maxG=p[1];
        if(p[2]<minB)minB=p[2];if(p[2]>maxB)maxB=p[2];
      }
      let ch=0;
      if(maxG-minG>maxR-minR&&maxG-minG>maxB-minB)ch=1;
      else if(maxB-minB>maxR-minR)ch=2;
      bucket.sort((a,b)=>a[ch]-b[ch]);
      const mid=Math.floor(bucket.length/2);
      return [...cut(bucket.slice(0,mid),depth-1),...cut(bucket.slice(mid),depth-1)];
    }
    const depth=Math.ceil(Math.log2(numColors));
    const pal=cut(pixels,depth).slice(0,numColors);
    while(pal.length<numColors)pal.push([0,0,0]);
    return pal;
  }

  const BAYER8=[
     0,32, 8,40, 2,34,10,42,
    48,16,56,24,50,18,58,26,
    12,44, 4,36,14,46, 6,38,
    60,28,52,20,62,30,54,22,
     3,35,11,43, 1,33, 9,41,
    51,19,59,27,49,17,57,25,
    15,47, 7,39,13,45, 5,37,
    63,31,55,23,61,29,53,21
  ].map(v=>(v/64-0.5)*32);

  function buildKDTree(pal,d=0){
    if(!pal.length)return null;
    if(pal.length===1)return{color:pal[0][0],idx:pal[0][1],left:null,right:null};
    const ch=d%3; pal.sort((a,b)=>a[0][ch]-b[0][ch]);
    const mid=Math.floor(pal.length/2);
    return{color:pal[mid][0],idx:pal[mid][1],ch,
      left:buildKDTree(pal.slice(0,mid),d+1),right:buildKDTree(pal.slice(mid+1),d+1)};
  }
  function kdSearch(node,r,g,b,best={dist:Infinity,idx:0}){
    if(!node)return best;
    const c=node.color,dr=r-c[0],dg=g-c[1],db=b-c[2],dist=dr*dr+dg*dg+db*db;
    if(dist<best.dist){best.dist=dist;best.idx=node.idx;}
    if(!node.ch&&node.ch!==0)return best;
    const diff=[r,g,b][node.ch]-c[node.ch];
    const near=diff<0?node.left:node.right,far=diff<0?node.right:node.left;
    kdSearch(near,r,g,b,best); if(diff*diff<best.dist)kdSearch(far,r,g,b,best);
    return best;
  }
  function orderedDither(data,w,h,palette){
    const tree=buildKDTree(palette.map((c,i)=>[c,i]));
    const out=new Uint8Array(w*h);
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const i=y*w+x,pi=i*4,bayer=BAYER8[(y%8)*8+(x%8)];
      const r=Math.max(0,Math.min(255,data[pi]+bayer));
      const g=Math.max(0,Math.min(255,data[pi+1]+bayer));
      const b=Math.max(0,Math.min(255,data[pi+2]+bayer));
      out[i]=kdSearch(tree,r,g,b).idx;
    }
    return out;
  }

  async function encodeGIF(frames,palette,w,h,delay,onProgress){
    const bytes=[],wr=a=>{for(const b of a)bytes.push(b);},u16=n=>bytes.push(n&0xFF,(n>>8)&0xFF);
    wr([0x47,0x49,0x46,0x38,0x39,0x61]); u16(w); u16(h);
    bytes.push(0x80|7,0x00,0x00);
    for(let i=0;i<256;i++) wr(i<palette.length?palette[i]:[0,0,0]);
    wr([0x21,0xFF,0x0B,0x4E,0x45,0x54,0x53,0x43,0x41,0x50,0x45,0x32,0x2E,0x30,0x03,0x01,0x00,0x00,0x00]);
    for(let fi=0;fi<frames.length;fi++){
      wr([0x21,0xF9,0x04,0x00]); u16(delay); wr([0x00,0x00]);
      wr([0x2C]); u16(0); u16(0); u16(w); u16(h); bytes.push(0x00);
      const comp=lzwEncode(frames[fi],8);
      bytes.push(8);
      for(let i=0;i<comp.length;i+=255){const c=comp.slice(i,i+255);bytes.push(c.length);wr(c);}
      bytes.push(0x00);
      onProgress(fi/frames.length); await sleep(0);
    }
    bytes.push(0x3B);
    return new Blob([new Uint8Array(bytes)],{type:'image/gif'});
  }

  function lzwEncode(indices,minCodeSize){
    const cc=1<<minCodeSize,eof=cc+1;
    let codeSize=minCodeSize+1,next=eof+1;
    const tbl=new Map(),out=[];
    let buf=0,bits=0;
    const emit=code=>{buf|=code<<bits;bits+=codeSize;while(bits>=8){out.push(buf&0xFF);buf>>=8;bits-=8;}};
    const reset=()=>{tbl.clear();for(let i=0;i<cc;i++)tbl.set(String(i),i);codeSize=minCodeSize+1;next=eof+1;};
    reset(); emit(cc);
    let str=String(indices[0]);
    for(let i=1;i<indices.length;i++){
      const nx=str+','+indices[i];
      if(tbl.has(nx)){str=nx;continue;}
      emit(tbl.get(str));
      if(next<4096){tbl.set(nx,next++);if(next>(1<<codeSize))codeSize=Math.min(12,codeSize+1);}
      else{emit(cc);reset();}
      str=String(indices[i]);
    }
    emit(tbl.get(str)); emit(eof);
    if(bits>0)out.push(buf&0xFF);
    return out;
  }
